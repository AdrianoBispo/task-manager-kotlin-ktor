ktor {
  # Server deployment settings, including the HTTP port used by Ktor.
  deployment {
    port = 8080
    port = ${?PORT}
  }
  # Application entry point loaded by Ktor at startup.
  application {
    modules = [ com.adrianobispo.MainKt.module ]
  }

  # PostgreSQL connection settings with environment-variable overrides for deployment.
  postgres {
    url = "jdbc:postgresql://localhost:5432/task_manager"
    url = ${?POSTGRES_URL}
    user = "task_manager"
    user = ${?POSTGRES_USER}
    password = "task_manager"
    password = ${?POSTGRES_PASSWORD}
  }

  # Security configuration for JWT authentication and browser CORS access.
  security {
    # JWT token validation and identity configuration.
    jwt {
      secret = "task-manager-dev-secret"
      secret = ${?JWT_SECRET}
      issuer = "task-manager"
      issuer = ${?JWT_ISSUER}
      audience = "task-manager-users"
      audience = ${?JWT_AUDIENCE}
      realm = "task-manager"
      realm = ${?JWT_REALM}
    }
    # Cross-origin request settings for the frontend development hosts.
    cors {
      allowed-hosts = "localhost:3000,127.0.0.1:3000,localhost:5173,127.0.0.1:5173"
      allowed-hosts = ${?CORS_ALLOWED_HOSTS}
      allow-credentials = false
      allow-credentials = ${?CORS_ALLOW_CREDENTIALS}
    }
  }
}