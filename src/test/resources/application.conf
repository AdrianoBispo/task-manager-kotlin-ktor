# Test application configuration used by Ktor test engine.
ktor {
  # Entry point module loaded during tests.
  application {
    modules = [ com.adrianobispo.MainKt.module ]
  }

  # In-memory H2 database configured to emulate PostgreSQL behavior for tests.
  postgres {
    url = "jdbc:h2:mem:task_manager_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1"
    user = "sa"
    password = ""
  }

  # Security settings used by authentication and CORS tests.
  security {
    # JWT values used to sign and validate tokens in test scenarios.
    jwt {
      secret = "test-secret"
      issuer = "test-issuer"
      audience = "test-audience"
      realm = "test-realm"
    }
    # CORS defaults for local frontend test origin.
    cors {
      allowed-hosts = "localhost:3000"
      allow-credentials = false
    }
  }
}
